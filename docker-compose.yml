version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lc-studylab-backend
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"
    environment:
      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_RELOAD=false
      # 日志配置
      - LOG_FILE=logs/app.log
    volumes:
      # 持久化数据目录
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lc-studylab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lc-studylab-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # 浏览器通过宿主机端口访问后端，容器内部通过服务名访问后端
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lc-studylab-network

networks:
  lc-studylab-network:
    driver: bridge
